<?php get_header(); ?>

<?php while ( have_posts() ) : the_post(); ?>

<div class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="/">Home</a> / <a href="/blog">Blog</a> / <?php the_title(); ?></div>
    <h1><?php the_title(); ?></h1>
    <p>📅 <?php echo get_the_date(); ?> &nbsp;·&nbsp; 👤 <?php the_author(); ?></p>
  </div>
</div>

<section class="section">
  <div class="container" style="max-width:800px">
    <?php if ( has_post_thumbnail() ) : ?>
    <div style="border-radius:var(--radius-lg);overflow:hidden;margin-bottom:40px">
      <?php the_post_thumbnail('large', ['style' => 'width:100%;height:auto']); ?>
    </div>
    <?php endif; ?>
    <div class="entry-content">
      <?php the_content(); ?>
    </div>

    <!-- Tags -->
    <?php $tags = get_the_tags(); if ($tags) : ?>
    <div style="margin-top:32px;display:flex;gap:8px;flex-wrap:wrap">
      <?php foreach($tags as $tag) : ?>
        <a href="<?php echo get_tag_link($tag->term_id); ?>" class="product-tag"><?php echo $tag->name; ?></a>
      <?php endforeach; ?>
    </div>
    <?php endif; ?>

    <!-- Navigation -->
    <div style="display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--border)">
      <?php previous_post_link('<div>← %link</div>', '%title'); ?>
      <?php next_post_link('<div>%link →</div>', '%title'); ?>
    </div>
  </div>
</section>

<?php endwhile; ?>

<?php get_footer(); ?>
